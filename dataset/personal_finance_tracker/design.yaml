#  Organize the project into modules for
#   CLI parsing,
#   validation,
#    account management,
#     category management,
#      transaction management, 
#      recurring transactions,
#       reporting, persistence, 
#       and
#        formatting.

    
high_level_design:
style: "Modular"
components:
- name: "CLI Parser"
  responsibility: "Parse command-line arguments and dispatch to the appropriate handlers"
- name: "Validation"
  responsibility: "Validate input data for accounts, categories, transactions, and recurring rules"
- name: "Account Management"
  responsibility: "Handle creation, listing, renaming, and deletion of accounts"
- name: "Category Management"
  responsibility: "Handle creation and listing of categories"
- name: "Transaction Management"
  responsibility: "Handle creation, listing, editing, and deletion of transactions, and update account balances accordingly"
- name: "Recurring Transactions"
  responsibility: "Handle creation of recurring transaction rules and generation of transactions based on those rules"
- name: "Reporting"
  responsibility: "Generate monthly summaries and category totals"
- name: "Persistence"
  responsibility: "Manage SQLite database interactions for storing accounts, categories, transactions, and recurring rules"
- name: "Formatting"
  responsibility: "Format output for CLI display, including success and error messages"
relationships:
- source: "CLI Parser"
  target: "Validation"
  relationship_type: "gives input for validation to"
- source: "CLI Parser"
  target: "Account Management"
  relationship_type: "gives account input to"
- source: "CLI Parser"
  target: "Category Management"
  relationship_type: "gives category input to"
- source: "CLI Parser"
  target: "Transaction Management"
  relationship_type: "gives transaction input to"
- source: "CLI Parser"
  target: "Recurring Transactions"
  relationship_type: "gives recurring transaction input to"
- source: "CLI Parser"
  target: "Reporting"
  relationship_type: "requests reports from"
- source: "Account Management"
  target: "Persistence"
  relationship_type: "stores accounts in"
- source: "Category Management"
  target: "Persistence"
  relationship_type: "stores categories in"
- source: "Transaction Management"
  target: "Persistence"
  relationship_type: "stores transactions in"
- source: "Recurring Transactions"
  target: "Persistence"
  relationship_type: "stores recurring rules in"
- source: "Reporting"
  target: "Persistence"
  relationship_type: "queries transactions and accounts from"
- source: "Validation"
  target: "Persistence"
  relationship_type: "queries accounts and categories from"
- source: "CLI Parser"
  target: "Formatting"
  relationship_type: "sends output to"
- source: "Validation"
  target: "Formatting"
  relationship_type: "sends validation error messages to"
- source: "Account Management"
  target: "Formatting"
  relationship_type: "sends success or error messages to"
- source: "Category Management"
  target: "Formatting"
  relationship_type: "sends success or error messages to"
- source: "Transaction Management"
  target: "Formatting"
  relationship_type: "sends success or error messages to"
- source: "Recurring Transactions"
  target: "Formatting"
  relationship_type: "sends success or error messages to"
- source: "Reporting"
  target: "Formatting"
  relationship_type: "sends report output to"
technologies:
- "Python 3.13"
- "SQLite (sqlite3)"
- "argparse"
- "pytest"