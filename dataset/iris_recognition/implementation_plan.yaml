implementation_plan:
  - step_id: "0"
    module_target: "project"
    action: "Set up the Python package structure, dependency configuration, and test directories described in the repository structure"
    result: "The project has a clear source layout, installable package, and test layout"
  - step_id: "1"
    module_target: "ImageMetadata, ImageQualityReport, BoundaryGeometry, SegmentationMask, NormalizedIris, IrisCodeTemplate, MatchScore, RecognitionResult, GaborResponseProvider, PhaseBitQuantizer, TemplateRepository, TemplateComparator, FalseMatchRiskEstimator"
    action: "Implement the core schema/data modules and dependency-inversion interfaces used to pass data and substitute fake dependencies during tests"
    result: "Pipeline stages can exchange typed data objects and higher-level modules can be tested against interfaces without concrete downstream implementations"
  - step_id: "2"
    module_target: "ImageLoader"
    action: "Implement image loading and grayscale normalization for supported eye-image inputs"
    result: "Eye images can be loaded into the standard ImageMetadata representation"
  - step_id: "3"
    module_target: "FocusQualityEvaluator"
    action: "Implement focus and sharpness assessment using high-frequency content or an equivalent focus metric"
    result: "Blurry or low-quality images can be rejected or flagged before segmentation"
  - step_id: "4"
    module_target: "CircularBoundaryDetector"
    action: "Implement pupil and outer iris boundary localization using Daugman's integro-differential circular detector or an equivalent circular edge detector"
    result: "The system can estimate non-concentric pupil and iris centers, radii, and localization confidence"
  - step_id: "5"
    module_target: "EyelidDetector, EyelashDetector, ReflectionDetector"
    action: "Implement separate detectors for eyelid occlusion, eyelash occlusion, and specular reflection artifacts"
    result: "Major non-iris and corrupted image regions can be detected as binary masks"
  - step_id: "6"
    module_target: "ArtifactMaskCombiner"
    action: "Implement mask combination and mask-quality calculations for eyelids, eyelashes, reflections, contact-lens artifacts, and other low-quality regions"
    result: "The system can produce a single SegmentationMask with valid iris fraction and warnings"
  - step_id: "7"
    module_target: "RubberSheetNormalizer"
    action: "Implement rubber-sheet normalization that maps iris texture and masks into aligned polar coordinates"
    result: "Segmented iris images can be transformed into NormalizedIris objects that compensate for size, position, and pupil dilation"
  - step_id: "8"
    module_target: "GaborFilterBank"
    action: "Implement multi-scale complex 2D Gabor filtering over normalized iris texture as a concrete GaborResponseProvider"
    result: "Normalized iris texture can be converted into complex phase responses at the required scales and frequencies"
  - step_id: "9"
    module_target: "PhaseQuantizer"
    action: "Implement cyclic gray-code-style quantization of real and imaginary Gabor response signs as a concrete PhaseBitQuantizer"
    result: "Complex Gabor responses can be converted into binary phase-bit vectors"
  - step_id: "10"
    module_target: "IrisCodeEncoder"
    action: "Implement IrisCode template creation by coordinating injected GaborResponseProvider and PhaseBitQuantizer dependencies, mask alignment, and metadata attachment"
    result: "Normalized iris data can be encoded into IrisCodeTemplate objects and the encoder can be unit-tested with fake providers"
  - step_id: "11"
    module_target: "TemplateSerializer, TemplateStore, TemplateGallery"
    action: "Implement local template serialization, file-backed TemplateRepository storage, gallery listing, enrollment, and identity lookup"
    result: "Enrolled templates can be saved, loaded, listed, and retrieved, and gallery behavior can be unit-tested with an in-memory fake repository"
  - step_id: "12"
    module_target: "MaskedHammingMatcher"
    action: "Implement masked fractional Hamming Distance using XOR over code bits and AND over mutually valid mask bits as a concrete TemplateComparator"
    result: "Two IrisCode templates can be compared using only mutually unmasked bits"
  - step_id: "13"
    module_target: "RotationCompensator"
    action: "Implement cyclic angular shift comparison and best-score selection using an injected TemplateComparator"
    result: "Template comparison can account for eye rotation and the rotation logic can be unit-tested with a fake comparator"
  - step_id: "14"
    module_target: "FalseMatchRiskModel"
    action: "Implement one-to-many false-match scaling using P_N = 1 - (1 - P_1)^N as a concrete FalseMatchRiskEstimator"
    result: "Identification results can include database-size false-match risk estimates"
  - step_id: "15"
    module_target: "MatchDecisionEngine"
    action: "Implement verification and identification decision logic using configurable thresholds, minimum valid-bit rules, and an injected FalseMatchRiskEstimator"
    result: "Match scores can be converted into match, non-match, or low-confidence decisions and tested with fake risk estimators"
  - step_id: "16"
    module_target: "ResultFormatter"
    action: "Implement result formatting for scores, selected rotation shift, valid-bit count, quality status, warnings, and candidate identity"
    result: "Recognition results can be presented clearly to users or downstream systems"
  - step_id: "17"
    module_target: "tests"
    action: "Write focused unit tests for data schemas, interfaces, image loading, quality assessment, boundary localization, masks, normalization, encoding, matching, decision logic, storage, and reporting; use fake implementations of interfaces to isolate modules"
    result: "Each module has direct automated coverage for its expected behavior and can be tested without requiring unrelated concrete pipeline stages"
  - step_id: "18"
    module_target: "tests"
    action: "Write integration tests for template creation, one-to-one verification, one-to-many identification, low-quality image rejection, low-valid-bit rejection, and rotation compensation"
    result: "The end-to-end iris recognition workflows are verified across the main pipeline paths"
  - step_id: "19"
    module_target: "project"
    action: "Run the automated test suite, review algorithm assumptions, and finalize usage documentation"
    result: "The implementation is tested, documented, and ready for evaluation"
