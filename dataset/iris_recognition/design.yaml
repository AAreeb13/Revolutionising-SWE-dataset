high_level_design:
  style: "Modular biometric recognition pipeline"
  components:
    - name: "Eye Image Input"
      type: "interface"
      responsibilities:
        - "Accept monochrome or near-infrared eye images for enrollment, verification, and identification workflows"
        - "Expose image metadata needed by downstream quality and recognition stages"
        - "Keep image acquisition concerns separate from recognition logic"
    - name: "Image Quality Assessment"
      type: "service"
      responsibilities:
        - "Evaluate whether an input eye image is sharp and usable before segmentation"
        - "Reject or flag images with insufficient focus or quality"
        - "Provide quality metrics for result reporting and low-confidence decisions"
    - name: "Boundary Localization"
      type: "service"
      responsibilities:
        - "Locate the pupil boundary and outer iris boundary"
        - "Estimate pupil and iris centers and radii without assuming concentric circles"
        - "Provide boundary geometry needed for normalization and mask generation"
    - name: "Occlusion & Mask Detection"
      type: "service"
      responsibilities:
        - "Detect eyelids, eyelashes, reflections, contact-lens artifacts, and other unusable regions"
        - "Produce an occlusion mask aligned with the segmented iris"
        - "Provide mask-quality metadata for later template masking and confidence decisions"
    - name: "Iris Normalization"
      type: "service"
      responsibilities:
        - "Map the segmented annular iris region into normalized rubber-sheet coordinates"
        - "Compensate for iris size, pupil dilation, and eye position"
        - "Preserve alignment between normalized texture and normalized mask regions"
    - name: "Iris Feature Encoding"
      type: "service"
      responsibilities:
        - "Apply multi-scale complex Gabor wavelet phase encoding to normalized iris texture"
        - "Quantize real and imaginary phase-response signs into gray-code-style quadrant bits"
        - "Produce a compact IrisCode bit vector and aligned mask bit vector"
    - name: "IrisCode Template"
      type: "model"
      responsibilities:
        - "Represent an enrolled or probe iris as phase bits plus aligned mask bits"
        - "Store identity metadata needed for verification or identification"
        - "Track quality metadata such as valid-bit count and segmentation status"
    - name: "Template Gallery"
      type: "storage"
      responsibilities:
        - "Hold enrolled IrisCode templates for one-to-one and one-to-many matching"
        - "Support adding, loading, listing, and retrieving templates without requiring a database"
        - "Keep gallery storage details separate from matching and decision logic"
    - name: "Template Matcher"
      type: "service"
      responsibilities:
        - "Compare IrisCode templates using masked fractional Hamming Distance"
        - "Apply cyclic angular shifts for orientation compensation"
        - "Return the best Hamming Distance and valid-bit count for each comparison"
    - name: "Decision Engine"
      type: "service"
      responsibilities:
        - "Apply configurable match thresholds to verification and identification scores"
        - "Reject or downgrade comparisons with too few mutually valid bits"
        - "Account for one-to-many false-match scaling when interpreting gallery search results"
    - name: "Result Reporting"
      type: "interface"
      responsibilities:
        - "Return match or non-match decisions with scores and confidence indicators"
        - "Expose quality, segmentation, mask, and valid-bit information"
        - "Present candidate identity information for identification workflows"
  Relationships:
    - source: "Eye Image Input"
      target: "Image Quality Assessment"
      relationship_type: "provides candidate eye images to"
    - source: "Image Quality Assessment"
      target: "Boundary Localization"
      relationship_type: "passes usable images to"
    - source: "Image Quality Assessment"
      target: "Result Reporting"
      relationship_type: "provides image quality metrics to"
    - source: "Boundary Localization"
      target: "Occlusion & Mask Detection"
      relationship_type: "provides iris and pupil boundary geometry to"
    - source: "Boundary Localization"
      target: "Iris Normalization"
      relationship_type: "provides iris and pupil boundary geometry to"
    - source: "Occlusion & Mask Detection"
      target: "Iris Normalization"
      relationship_type: "provides occlusion mask data to"
    - source: "Boundary Localization"
      target: "Result Reporting"
      relationship_type: "provides boundary localization status to"
    - source: "Occlusion & Mask Detection"
      target: "Result Reporting"
      relationship_type: "provides mask quality and occlusion status to"
    - source: "Iris Normalization"
      target: "Iris Feature Encoding"
      relationship_type: "provides normalized iris texture and mask data to"
    - source: "Iris Feature Encoding"
      target: "IrisCode Template"
      relationship_type: "creates"
    - source: "IrisCode Template"
      target: "Template Gallery"
      relationship_type: "is stored in"
    - source: "Template Gallery"
      target: "Template Matcher"
      relationship_type: "provides enrolled templates to"
    - source: "IrisCode Template"
      target: "Template Matcher"
      relationship_type: "provides probe and enrolled templates to"
    - source: "Template Matcher"
      target: "Decision Engine"
      relationship_type: "provides Hamming Distance scores and valid-bit counts to"
    - source: "Decision Engine"
      target: "Result Reporting"
      relationship_type: "provides final decisions and confidence information to"
  Technologies:
    - "Python"
    - "NumPy"
    - "OpenCV or scikit-image"
    - "SciPy"
    - "File-based template storage"
