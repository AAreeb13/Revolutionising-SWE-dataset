
project_id: "snake_game"
project_prompt: |
  Design and implement a simple snake game in Python. The game is expected to have the following features:
    1. A snake that can move in four directions (up, down, left, right).
    2. Food that appears at random locations on the game board.
    3. The snake grows in length each time it eats food.
    4. The game ends if the snake collides with itself or the walls of the game board. The player is allowed to restart if they would like to.
    5. A simple user interface to display the game board, snake, and food.
    6. A scoring system that keeps track of the player's score based on the number of food items.
    7. The history of scores should be accessible to the player in a non-cluttered way.
    The implementation should be done in Python and you are free to use any libraries such as Pygame for the game development.


project_type: "game"
difficulty: "low"

requirements:
  functional:
    - The snake can be moved by the user
    - The food appears at random locations
    - The food disappears when eaten by the snake
    - The snake grows in length when it eats food
    - The game ends when the snake collides with itself or the walls
    - The interface shows the game board, snake, food, score and score history
    - The score is updated each time the snake eats food
    - The score history should not clutter the interface and should be accessible to the player
    - The game can be restarted after it ends
  non_functional:
    - The game is written in Python
    - The game should have a simple and intuitive user interface
    - The user inputs should be responsive and the game should run smoothly
  assumptions:
    - The game board size can be assumed to be fixed (any resonable size)
    - initial length of the snake can be assumed to be 3 units
    - Appropriate colours used for the snake, food, and game board to ensure good visibility
    - The user inputs will be keyboard controls for moving the snake
  constraints: 
    - The game should be implemented using Python
    - The use of libraries such as Pygame is allowed for game development
  out_of_scope:
    - Advanced graphics or animations beyond the basic requirements
    - Multiplayer functionality
    - Saving and loading game states
    - Implementing different levels or game modes

  high_level_design:
    style: "Modular"
    components:
      - name: "The Snake Game"
        responsibility: "Overall management of the game, including initializing components and managing the game loop"
      - name: "Git Repository"
        responsibility: "Version control and collaboration"

  modules:
  - name: "Snake"
    component: "Snake Game"
    type: "class"
    responsibilities: 
      - Represent the state of the snake

    signatures:
      type: "method"
      name: "move"
      inputs:
        - name: direction
          type: str
          required: True
      outputs:
        new_positions: list[tuple[int, int]]

    dependencies: []
    Technologies: ["Python"]
  - name: "Food"
    component: "Snake Game"
    responsibilities: 
      - Represent the state of the food
    signatures:
      type: "method"
      name: "generate_food"
      inputs: 
        - name: game_board_size
          type: tuple[int, int]
          required: True
      outputs:
        new_position: tuple[int, int]
    dependencies: []
    Technologies: ["Python"]
  - name: "GameBoard"
    component: "Snake Game"
    responsibilities: 
      - Represent the game board and its boundaries
      - Handle the game logic such as collision detection
    signatures:
      - type: "method"
        name: "check_collisions"
      
        inputs:
          - snake_positions: list[tuple[int, int]]
          - wall_boundaries: list[tuple[int, int]]
        outputs:
          collision: bool
      - type: "method"
        name: "check_food_collision"
        inputs:
          - snake_positions: list[tuple[int, int]]
          - food_position: tuple[int, int]
        outputs:
          food_collision: bool
      - type: "method"
        name: "update_board"
        inputs:
          - snake_positions: list[tuple[int, int]]
          - food_position: tuple[int, int]
    outputs:
      - collision: bool
      - food_collision: bool
    dependencies: ["Snake", "Food"]
  - name: "GameState"
    responsibilities: 
      - Store the current snake, food, score and game status (running or ended)
    inputs:
      - snake: Snake
      - food: Food
      - score: int
      - game_status: str
    outputs:
      - current_state: dict
    dependencies: ["Snake", "Food", "Score Manager"]

  - name: "Game Engine"
    type: "class"
    responsibilities: 
      - Manage the game loop, update the game state based on user input and game logic, and determine when the game ends
    dependencies: ["GameState", "GameBoard", "Food", "Score Manager"]
    signatures:
      type: "method"
      name: "update_game_state"
      inputs:
        - user_input: str
        - current_state: dict
      outputs:
        - updated_state: dict


  - name: "Score Manager"
    component: "Snake Game"
    type: "class"
    responsibilities: 
      - Manage the score and score history
    dependencies: []  
    signatures:
      type: "method"
      name: "update_score"
      inputs:
        - current_score: int
      outputs:
        - new_score: int
        # - score_history: list[int]
      type: "method"
      name: "get_score_history"
      inputs: []
      outputs:
        - score_history: list[int]

  - name: "Input Handler"
    component: "Snake Game"
    type: "class"
    responsibilities: 
      - Handle user input for controlling the snake
    inputs: []
    outputs:
      - movement_command: str
    dependencies: []
    signatures:
      type: "method"
      name: "translate_input"
      inputs: 
        - raw_input: str
      outputs:
        movement_command: str
  
  - name: "Renderer"
    component: "Snake Game"
    type: "class"
    responsibilities: 
      - Render the game board, snake, food, score and score history on the screen
    dependencies: ["GameState", "Score Manager"]
    signatures:
      type: "method"
      name: "render"
      inputs:
        - current_state: dict
        - score_history: list[int]
      outputs:
        - None
      description: "Renders the game state and score history on the screen using a library such as Pygame"

  - repository_structure:
    - 
    - "src/"
    - "src/snake.py"
    - "src/food.py"
    - "src/game_board.py"
    - "src/game_state.py"
    - "src/game_engine.py"
    - "src/score_manager.py"
    - "src/input_handler.py"
    - "src/renderer.py"
    - "tests/"
    - "tests/unit/snake_test.py"
    - "tests/unit/food_test.py"
    - "tests/unit/game_board_test.py"
    - "tests/unit/game_state_test.py"
    - "tests/unit/game_engine_test.py"
    - "tests/unit/score_manager_test.py"
    - "tests/unit/input_handler_test.py"
    - "tests/unit/renderer_test.py"
    - "tests/integration/gameplay_test.py"
  - implementation_plan: 
    - step_id: 0
      description: "Set up the project structure and initialize a git repository"
    - step_id: 1
      description: "Implement the Snake component with basic movement functionality"
    - step_id: 2
      description: "Test the Snake component"
    - step_id: 3
      description: "Implement the Food component"
    - step_id: 4
      description: "Test the Food component"
    - step_id: 5
      description: "Implement the GameBoard component with collision detection"
    - step_id: 6
      description: "Test the GameBoard component"
    - step_id: 7
      description: "Implement the GameState component to store the current state of the game"

graph_dependencies:
  - component: "Snake Game"
    Relationships:
      - source: "Input Handler"
        target: "Snake"
        relationship_type: "sends movement commands to"
      - source: "Game Engine"
        target: "GameState"
        relationship_type: "updates"
      - source: "Game Engine"
        target: "GameBoard"
        relationship_type: "queries for collisions"
      - source: "Game Engine"
        target: "Food"
        relationship_type: "queries for food collision"
      - source: "Game Engine"
        target: "Score Manager"
        relationship_type: "updates score"
      - source: "Renderer"
        target: "GameState"
        relationship_type: "renders"
      - source: "Renderer"
        target: "Score Manager"
        relationship_type: "renders score and score history"